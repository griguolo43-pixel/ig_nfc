<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Apri Instagram</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,sans-serif;
      background:#fff;
      text-align:center;
    }
    .box{
      width:100%;
      max-width:360px;
      padding:24px;
    }
    .btn{
      display:block;
      width:100%;
      padding:22px;
      border-radius:16px;
      background:#d62976;
      color:#fff;
      text-decoration:none;
      font-size:22px;
      font-weight:bold;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <button class="btn" id="openBtn">Apri Instagram</button>
  </div>

  <script>
    const username = "leonardogriguolo";
    const trackingBase = "https://script.google.com/macros/s/AKfycbzn8JrSHf15pL1_ZHKCaj_PahOY1G_SKAQIB2txNzQ/dev";
    const ua = navigator.userAgent || "";
    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);

    const webUrl = "https://www.instagram.com/" + username + "/";
    const iosUrl = "instagram://user?username=" + username;
    const androidIntent = "intent://www.instagram.com/" + username + "/#Intent;package=com.instagram.android;scheme=https;end";

    const trackUrl =
      trackingBase +
      "?src=nfc&ua=" + encodeURIComponent(ua) +
      "&t=" + Date.now();

    const img = new Image();
    img.src = trackUrl;

    document.getElementById("openBtn").addEventListener("click", function () {
      if (isAndroid) {
        window.location.href = androidIntent;
        setTimeout(function () {
          window.location.href = webUrl;
        }, 1200);
      } else if (isIOS) {
        window.location.href = iosUrl;
        setTimeout(function () {
          window.location.href = webUrl;
        }, 1200);
      } else {
        window.location.href = webUrl;
      }
    });
  </script>
</body>
</html>
