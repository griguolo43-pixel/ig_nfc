<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Apri Instagram</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,sans-serif;
      background:#fff;
      text-align:center;
    }
    .box{
      width:100%;
      max-width:360px;
      padding:24px;
    }
    .btn{
      display:block;
      width:100%;
      padding:20px;
      border-radius:16px;
      background:#d62976;
      color:#fff;
      text-decoration:none;
      font-size:20px;
      font-weight:bold;
      border:none;
      cursor:pointer;
    }
    .small{
      display:inline-block;
      margin-top:14px;
      color:#d62976;
      text-decoration:none;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <button class="btn" id="openBtn">Apri Instagram</button>
    <a class="small" id="webLink" href="https://www.instagram.com/leonardogriguolo/">Apri versione web</a>
  </div>

  <script>
    const username = "leonardogriguolo";
    const trackingUrl = "https://script.google.com/macros/s/AKfycbwQDgmNs0Z8f0HCwiexa4vDAR0Yxtr9uYIcFRfX-Dnzkju_B8YkG7jOzqazaFXE-Z8X/exec";
    const ua = navigator.userAgent || "";

    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);

    const webUrl = "https://www.instagram.com/" + username + "/";
    const androidIntent = "intent://www.instagram.com/" + username + "/#Intent;package=com.instagram.android;scheme=https;end";

    document.getElementById("webLink").href = webUrl;

    const data = {
      src: "nfc",
      ua: ua,
      t: Date.now()
    };

    if (navigator.sendBeacon) {
      const blob = new Blob([JSON.stringify(data)], { type: "text/plain;charset=UTF-8" });
      navigator.sendBeacon(trackingUrl, blob);
    } else {
      fetch(trackingUrl, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=UTF-8" },
        body: JSON.stringify(data),
        keepalive: true
      }).catch(() => {});
    }

    document.getElementById("openBtn").addEventListener("click", function () {
      if (isAndroid) {
        window.location.href = androidIntent;
        setTimeout(function () {
          window.location.href = webUrl;
        }, 1200);
      } else {
        // iPhone: niente instagram:// per evitare il prompt extra
        window.location.href = webUrl;
      }
    });
  </script>
</body>
</html>
