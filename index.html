<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Apri Instagram</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,sans-serif;
      background:#fff;
      text-align:center;
    }
    .box{
      width:100%;
      max-width:340px;
      padding:24px;
    }
    .btn{
      display:block;
      width:100%;
      padding:18px;
      border-radius:14px;
      background:#d62976;
      color:#fff;
      text-decoration:none;
      font-size:18px;
      font-weight:bold;
      border:none;
    }
    .small{
      display:inline-block;
      margin-top:14px;
      color:#d62976;
      text-decoration:none;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <button class="btn" id="openBtn">Apri Instagram</button>
    <a class="small" id="webLink" href="https://www.instagram.com/leonardogriguolo/">Apri versione web</a>
  </div>

  <script>
    const username = "leonardogriguolo";
    const trackingBase = "INCOLLA_QUI_LINK_APPS_SCRIPT";
    const ua = navigator.userAgent || "";
    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);

    const webUrl = "https://www.instagram.com/" + username + "/";
    const iosUrl = "instagram://user?username=" + username;
    const androidIntent = "intent://www.instagram.com/" + username + "/#Intent;package=com.instagram.android;scheme=https;end";

    document.getElementById("webLink").href = webUrl;

    // tracking rapido
    const trackUrl =
      trackingBase +
      "?src=nfc&ua=" + encodeURIComponent(ua) +
      "&t=" + Date.now();

    // uso immagine invisibile: spesso più affidabile e veloce di fetch in questo caso
    const img = new Image();
    img.src = trackUrl;

    const btn = document.getElementById("openBtn");

    btn.addEventListener("click", function () {
      if (isAndroid) {
        window.location.href = androidIntent;
        setTimeout(function () {
          window.location.href = webUrl;
        }, 1200);
      } else if (isIOS) {
        window.location.href = iosUrl;
        setTimeout(function () {
          window.location.href = webUrl;
        }, 1200);
      } else {
        window.location.href = webUrl;
      }
    });

    // tentativo automatico rapido
    setTimeout(function () {
      btn.click();
    }, 250);
  </script>
</body>
</html>
